  <a href="YOUR-PDF-FILE.pdf"

<!-- === FIXED FULL BOOK PREVIEW MODAL === -->
<div id="preview-modal" 
     style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; overflow: hidden;">

  <div style="position: relative; max-width: 92%; max-height: 92vh; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.4);">
    
    <!-- Top bar exactly like in your video -->
    <div style="padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
      <h3 style="margin: 0; font-size: 1.3rem; font-weight: 600;">Full Book Preview</h3>
      <button onclick="closePreview()" 
              style="background: none; border: none; font-size: 32px; line-height: 1; cursor: pointer; padding: 0 8px;">×</button>
    </div>
    
    <!-- The image – now properly contained (this fixes the bug) -->
    <div style="padding: 20px; text-align: center; max-height: calc(92vh - 65px); overflow: hidden;">
      <img id="modal-image" 
           src="YOUR-BOOK-COVER-IMAGE.jpg" 
           alt="Full Book Preview"
           style="max-width: 100%; max-height: 78vh; height: auto; object-fit: contain; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-radius: 8px;">
    </div>
  </div>
</div>

<script>
  // Open modal when book cover is clicked
  document.getElementById('book-cover').addEventListener('click', function() {
    document.getElementById('preview-modal').style.display = 'flex';
  });

  // Close modal
  function closePreview() {
    document.getElementById('preview-modal').style.display = 'none';
  }

  // Close when tapping outside the white box
  document.getElementById('preview-modal').addEventListener('click', function(e) {
    if (e.target.id === 'preview-modal') closePreview();
  });
</script>
