<!-- === BOOK PROMOTION SECTION (FULL-SCREEN MOBILE HERO) === -->
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px 20px 40px; box-sizing: border-box; margin: 0; background: #ffffff;">

  <!-- Clickable Book Cover – takes up almost the entire screen -->
  <img 
    id="book-cover"
    src="cover.JPEG" 
    alt="Nutrition, Invested by Andrew Rios"
    style="width: 100%; max-width: 520px; height: auto; max-height: 68vh; cursor: pointer; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); border-radius: 12px; margin-bottom: 24px;">

  <!-- Bigger & Bolder Download Button -->
  <a href="nutrition-invested.pdf" 
     download="Nutrition-Invested-Andrew-Rios.pdf"
     style="display: inline-block; background: #00b140; color: white; padding: 24px 56px; font-size: 1.55rem; font-weight: 900; letter-spacing: 1.5px; border-radius: 50px; text-decoration: none; box-shadow: 0 12px 30px rgba(0,177,64,0.4); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
    FREE DOWNLOAD (PDF)
  </a>

  <!-- Subtle instructional text (exactly what you asked for, but polished & mobile-friendly) -->
  <p style="margin-top: 18px; color: #666; font-size: 0.95rem; font-weight: 500; line-height: 1.3;">
    Tap image to preview • Button to download
  </p>
</div>

<!-- === FIXED FULL BOOK PREVIEW MODAL (unchanged) === -->
<div id="preview-modal" 
     style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; overflow: hidden;">

  <div style="position: relative; max-width: 92%; max-height: 92vh; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.4);">
    
    <!-- Top bar -->
    <div style="padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
      <h3 style="margin: 0; font-size: 1.3rem; font-weight: 600;">Full Book Preview</h3>
      <button onclick="closePreview()" 
              style="background: none; border: none; font-size: 32px; line-height: 1; cursor: pointer; padding: 0 8px;">×</button>
    </div>
    
    <!-- The image – properly contained -->
    <div style="padding: 20px; text-align: center; max-height: calc(92vh - 65px); overflow: hidden;">
      <img id="modal-image" 
           src="cover.JPEG" 
           alt="Full Book Preview"
           style="max-width: 100%; max-height: 78vh; height: auto; object-fit: contain; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-radius: 8px;">
    </div>
  </div>
</div>

<script>
  // Open modal when book cover is clicked
  document.getElementById('book-cover').addEventListener('click', function() {
    document.getElementById('preview-modal').style.display = 'flex';
  });

  // Close modal
  function closePreview() {
    document.getElementById('preview-modal').style.display = 'none';
  }

  // Close when tapping outside the white box
  document.getElementById('preview-modal').addEventListener('click', function(e) {
    if (e.target.id === 'preview-modal') closePreview();
  });
</script>
