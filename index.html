<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nutrition, Invested</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #e8e8e8;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: calc(env(safe-area-inset-top, 0px) + 24px) 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
    }

    .cover-wrapper {
      width: 100%;
      max-height: calc(100dvh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-wrapper a {
      display: block;
      width: 100%;
      max-height: 100%;
    }

    .cover-wrapper img {
      display: block;
      width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 0;
      filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.22));
      cursor: pointer;
    }

    .download-btn {
      flex-shrink: 0;
      width: 100%;
      max-width: 480px;
      background: #00b140;
      color: #ffffff;
      border: none;
      border-radius: 50px;
      margin-top: 20px;
      padding: 18px 24px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0, 177, 64, 0.35);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .download-btn:active {
      transform: scale(0.97);
      box-shadow: 0 5px 14px rgba(0, 177, 64, 0.25);
    }

    .preview-hint {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #888;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      letter-spacing: 0.5px;
    }

    .toast {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.78);
      color: #fff;
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 0.88rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Ghost mute icon ── */
    .music-btn {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 20px;
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 998;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.22;
      transition: opacity 0.2s ease, transform 0.15s ease;
    }

    .music-btn:active {
      transform: scale(0.88);
      opacity: 0.45;
    }

    .music-btn svg {
      width: 20px;
      height: 20px;
      fill: #222;
    }
  </style>
</head>
<body>

  <div class="cover-wrapper">
    <a href="https://andrewsportal.github.io/nutrition-invested/nutrition-invested.pdf" target="_blank">
      <img src="cover.JPEG" alt="Nutrition, Invested by Andrew Rios">
    </a>
  </div>

  <button class="download-btn" onclick="downloadPDF()">
    Buy $1.99 (PDF)
  </button>

  <p class="preview-hint">TAP COVER TO READ</p>

  <div class="toast" id="toast"></div>

  <button class="music-btn" id="musicBtn" onclick="toggleMusic()" aria-label="Toggle music">
    <svg id="iconPlaying" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
    <svg id="iconMuted" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-3-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19L19 20.27 20.27 19 5.27 4 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
  </button>

  <audio id="bgAudio" loop preload="auto">
    <source src="https://andrewsportal.github.io/nutrition-invested/audio.mp3" type="audio/mpeg">
  </audio>

  <script>
    const pdfUrl = 'https://drive.google.com/uc?export=download&id=1NduU7Jk74s5YcqB0WRNcEt0amUQd9pnh';
    const audio  = document.getElementById('bgAudio');
    const btn    = document.getElementById('musicBtn');
    const iconPlaying = document.getElementById('iconPlaying');
    const iconMuted   = document.getElementById('iconMuted');
    let playing = false;

    function startAudio() {
      if (!playing) {
        audio.volume = 0.35;
        audio.play().then(() => setPlaying(true)).catch(() => {});
      }
    }

    window.addEventListener('touchstart', startAudio, { once: true });
    window.addEventListener('mousedown',  startAudio, { once: true });
    window.addEventListener('click',      startAudio, { once: true });
    window.addEventListener('scroll',     startAudio, { once: true });

    function setPlaying(state) {
      playing = state;
      iconPlaying.style.display = state ? 'block' : 'none';
      iconMuted.style.display   = state ? 'none'  : 'block';
    }

    function toggleMusic() {
      if (playing) {
        audio.pause();
        setPlaying(false);
      } else {
        audio.play().catch(() => {});
        setPlaying(true);
      }
    }

    function showToast(msg, duration = 4500) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }

    function downloadPDF() {
      const link = document.createElement('a');
      link.href = pdfUrl;
      link.download = 'Nutrition-Invested-Andrew-Rios.pdf';
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('DOWNLOADING...');
    }
  </script>

</body>
</html>
