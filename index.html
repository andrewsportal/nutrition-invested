<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUTRITION, INVESTED | Free Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        /* Premium book cover – sharp corners + floating 3D effect */
        .book-cover {
            max-height: 90vh;
            width: auto;
            max-width: 100%;
            box-shadow: 
                0 35px 60px -15px rgb(0 0 0 / 0.35),
                0 10px 20px -5px rgb(0 0 0 / 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .book-cover:hover {
            transform: scale(1.03) rotate(1deg);
        }
        
        @media (max-width: 640px) {
            .book-cover {
                max-height: 82vh;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center py-8 px-4">
    
    <div class="w-full max-w-2xl mx-auto text-center">
        
        <!-- Clickable Book Cover – sharp corners, full visibility, premium floating shadow -->
        <div class="mb-10 flex justify-center cursor-pointer" onclick="openPdfModal()">
            <img src="cover.JPEG" 
                 alt="Nutrition, Invested"
                 class="book-cover mx-auto rounded-none">
        </div>

        <!-- Premium Download Button (matches screenshot style) -->
        <a href="nutrition-invested.pdf" 
           download="Nutrition_Invested_Andrew_Rios.pdf"
           class="inline-flex items-center justify-center gap-3 px-12 py-5 bg-emerald-600 hover:bg-emerald-700 text-white text-2xl font-semibold rounded-3xl shadow-2xl hover:shadow-3xl active:scale-95 transition-all mx-auto w-full max-w-md">
            📥 Free Download PDF
        </a>
    </div>

    <!-- PDF Modal (unchanged – already excellent) -->
    <div id="pdfModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-6xl w-full max-h-[96vh] flex flex-col overflow-hidden">
            
            <!-- Modal Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b bg-white">
                <div class="font-semibold text-gray-800">Full Book Preview</div>
                <button onclick="closePdfModal()" 
                        class="text-gray-400 hover:text-gray-800 text-4xl leading-none pb-1">×</button>
            </div>

            <!-- PDF Viewer -->
            <div class="flex-1 p-3 md:p-6 bg-gray-50">
                <iframe id="pdfFrame" 
                        src="nutrition-invested.pdf"
                        class="w-full h-full rounded-2xl border-0 shadow-inner"
                        style="min-height: 78vh;"></iframe>
            </div>

            <!-- Modal Footer -->
            <div class="px-6 py-5 border-t flex justify-end bg-white">
                <a href="nutrition-invested.pdf" 
                   download="Nutrition_Invested_Andrew_Rios.pdf"
                   class="inline-flex items-center px-8 py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl text-lg font-medium">
                    📥 Download Full PDF
                </a>
            </div>
        </div>
    </div>

    <script>
        function openPdfModal() {
            const modal = document.getElementById('pdfModal');
            const frame = document.getElementById('pdfFrame');
            modal.classList.remove('hidden');
            frame.src = 'nutrition-invested.pdf'; // fresh load
        }
        
        function closePdfModal() {
            document.getElementById('pdfModal').classList.add('hidden');
        }
        
        // Close when tapping outside the white box
        document.getElementById('pdfModal').addEventListener('click', function(e) {
            if (e.target === this) closePdfModal();
        });
        
        // Keyboard escape support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('pdfModal');
                if (!modal.classList.contains('hidden')) closePdfModal();
            }
        });
    </script>
</body>
</html>
