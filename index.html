<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nutrition, Invested</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: #e8e8e8;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: calc(env(safe-area-inset-top, 0px) + 10px) 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    .cover-wrapper {
      width: 100%;
      max-width: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-wrapper a { display: block; width: 100%; }

    .cover-wrapper img {
      display: block;
      width: 100%;
      max-height: 58vh;
      object-fit: contain;
      filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.22));
      cursor: pointer;
    }

    .preview-hint {
      margin-top: 16px;
      font-size: 0.72rem;
      color: #888;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .headline {
      width: 100%;
      max-width: 480px;
      text-align: center;
      margin-top: 12px;
      font-size: clamp(1rem, 4.4vw, 1.3rem);
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #00b140;
    }

    .headline .price {
      color: #222;
    }

    .headline .divider {
      color: #bbb;
      margin: 0 6px;
      font-weight: 700;
    }

    .buttons {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .buy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #ffffff;
      color: #111;
      border: 1.5px solid #d0d0d0;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: clamp(0.95rem, 3.8vw, 1.1rem);
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .buy-btn:active {
      transform: scale(0.97);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
    }

    .buy-btn img {
      height: 22px;
      width: auto;
    }

    .payment-section {
      width: 100%;
      max-width: 480px;
      text-align: center;
      margin-top: 14px;
    }

    .payment-section p {
      font-size: 11px;
      color: #666;
      margin-bottom: 10px;
      font-weight: 500;
      letter-spacing: 0.8px;
    }

    .payment-logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      opacity: 0.8;
    }

    .payment-logos img {
      height: 18px;
      width: auto;
    }
  </style>

</head>
<body>

  <div class="cover-wrapper">
    <a href="https://andrewsportal.github.io/nutrition-invested/nutrition-invested.pdf" target="_blank">
      <img src="cover.JPEG" alt="Nutrition, Invested by Andrew Rios">
    </a>
  </div>

  <p class="preview-hint">TAP COVER TO PREVIEW</p>

  <div class="headline">
    GET THE PLAYBOOK<span class="divider">—</span><span class="price">$9.99</span>
  </div>

  <div class="buttons">
    <a class="buy-btn" href="https://www.amazon.com/" target="_blank" rel="noopener">
      <img src="amazon.svg" alt="Amazon">
      <span>Buy on Amazon</span>
    </a>
    <a class="buy-btn" href="https://payhip.com/" target="_blank" rel="noopener">
      <img src="stripe.svg" alt="Stripe">
      <span>Buy with Stripe</span>
    </a>
  </div>

  <div class="payment-section">
    <p>SECURE CHECKOUT</p>
    <div class="payment-logos">
      <img src="applepay.svg" alt="Apple Pay">
      <img src="googlepay.svg" alt="Google Pay">
      <img src="paypal.svg" alt="PayPal">
      <img src="visa.svg" alt="Visa">
      <img src="mastercard.svg" alt="Mastercard">
      <img src="americanexpress.svg" alt="American Express">
    </div>
  </div>

</body>
</html>
